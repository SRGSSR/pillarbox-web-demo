      interval: "weekly"
    groups:
      node-dependencies:
        patterns: [ "*" ]
        update-types: [ "minor", "patch" ]

  - package-ecosystem: "npm"
    directory: "/samples/vanilla-ts"
    schedule:
      interval: "weekly"
    groups:
      node-dependencies:
        patterns: [ "*" ]
        update-types: [ "minor", "patch" ]

  - package-ecosystem: "npm"
    directory: "/samples/vue"
    schedule:
